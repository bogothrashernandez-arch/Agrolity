<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito de compras | AgroRed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS principal del proyecto -->
    <link rel="stylesheet" href="css/main.css">
    <!-- CSS específico del carrito -->
    <link rel="stylesheet" href="css/carrito.css">
</head>
<body>

    <!-- HEADER (reutilizable del proyecto) -->
    <header class="header">
        <div class="container header-content">
            <h1 class="logo">AgroRed</h1>

            <nav class="nav">
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Productos</a>
                <a href="carrito.html" class="active">Carrito</a>
            </nav>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="carrito container">

        <h2>Tu carrito de compras</h2>

        <!-- LISTA DE PRODUCTOS -->
        <section class="carrito-productos">

            <!-- Producto -->
            <article class="producto-carrito">
                <img src="img/producto-ejemplo.jpg" alt="Producto agrícola">

                <div class="producto-info">
                    <h3>Tomate orgánico</h3>
                    <p class="precio">$4.500</p>
                </div>

                <div class="producto-cantidad">
                    <label for="cantidad-1">Cantidad</label>
                    <input type="number" id="cantidad-1" value="1" min="1">
                </div>

                <div class="producto-subtotal">
                    <p>Subtotal</p>
                    <strong>$4.500</strong>
                </div>

                <button class="btn-eliminar">Eliminar</button>
            </article>

            <!-- Puedes duplicar este bloque para más productos -->

        </section>

        <!-- RESUMEN DEL CARRITO -->
        <aside class="carrito-resumen">
            <h3>Resumen de compra</h3>

            <div class="resumen-linea">
                <span>Subtotal</span>
                <span>$9.000</span>
            </div>

            <div class="resumen-linea">
                <span>Envío</span>
                <span>$5.000</span>
            </div>

            <div class="resumen-total">
                <span>Total</span>
                <strong>$14.000</strong>
            </div>

            <a href="checkout.html" class="btn-principal">
                Proceder al pago
            </a>
        </aside>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 AgroRed – Conectando el campo con la ciudad</p>
        </div>
    </footer>

</body>
</html>
